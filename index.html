<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ol' New York — Rich &amp; Loyal</title>
<style>
  :root {
    --accent: #d4af37;
    --bg: #0a0a0a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
  }

  .stage {
    position: relative;
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .vinyl-bg {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 140vmin;
    height: 140vmin;
    transform: translate(-50%, -50%);
    background-image: url('https://res.cloudinary.com/de6mu8teu/image/upload/v1779380594/Cd_Effect_Lines_Geometric_Album_Cover_rmluay.png');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    opacity: 0.55;
    animation: spin 8s linear infinite;
    animation-play-state: paused;
    z-index: 0;
    border-radius: 50%;
  }

  .vinyl-bg.playing { animation-play-state: running; }

  @keyframes spin {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to   { transform: translate(-50%, -50%) rotate(360deg); }
  }

  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    padding: 24px;
    text-align: center;
  }

  .album-cover {
    width: min(340px, 70vw);
    aspect-ratio: 1 / 1;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 30px 70px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.06);
  }

  .album-cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .titles { line-height: 1.3; }

  .album-title {
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 800;
    letter-spacing: 0.5px;
  }

  .artist {
    font-size: clamp(14px, 2vw, 18px);
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-top: 6px;
  }

  .player {
    width: min(520px, 90vw);
    background: rgba(15, 15, 15, 0.78);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 18px 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  }

  .now-playing {
    font-size: 13px;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }

  .track-name {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    margin-bottom: 14px;
  }

  .btn {
    background: none;
    border: none;
    color: #fff;
    cursor: pointer;
    padding: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s, color 0.15s;
  }

  .btn:hover { color: var(--accent); transform: scale(1.08); }
  .btn svg { width: 24px; height: 24px; }

  .play-btn {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--accent);
    color: #000;
  }
  .play-btn:hover { color: #000; background: #f0c14b; }
  .play-btn svg { width: 28px; height: 28px; }

  .progress {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: #aaa;
    font-variant-numeric: tabular-nums;
  }

  .progress-bar {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.12);
    border-radius: 4px;
    cursor: pointer;
    overflow: hidden;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: var(--accent);
    border-radius: 4px;
    transition: width 0.1s linear;
  }

  .tracklist {
    margin-top: 14px;
    border-top: 1px solid rgba(255,255,255,0.08);
    padding-top: 12px;
  }

  .track-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    color: #ccc;
    font-size: 14px;
    transition: background 0.15s;
  }

  .track-item:hover { background: rgba(255,255,255,0.06); }
  .track-item.active { color: var(--accent); background: rgba(212,175,55,0.08); }
  .track-num { width: 18px; color: #777; font-size: 12px; }

  @media (max-width: 600px) {
    .content { gap: 18px; }
    .album-cover { width: 60vw; }
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="vinyl-bg" id="vinylBg"></div>

    <div class="content">
      <div class="album-cover">
        <img src="https://res.cloudinary.com/de6mu8teu/image/upload/v1779380616/OL_NEW_YORK_FINAL_COVER_lh6odo.png" alt="Ol' New York album cover" />
      </div>

      <div class="titles">
        <div class="album-title">Ol' New York</div>
        <div class="artist">Rich &amp; Loyal</div>
      </div>

      <div class="player">
        <div class="now-playing">Now Playing</div>
        <div class="track-name" id="trackName">—</div>

        <div class="controls">
          <button class="btn" id="prevBtn" aria-label="Previous">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zM9.5 12l8.5 6V6z"/></svg>
          </button>
          <button class="btn play-btn" id="playBtn" aria-label="Play">
            <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          </button>
          <button class="btn" id="nextBtn" aria-label="Next">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6h2v12h-2z"/></svg>
          </button>
        </div>

        <div class="progress">
          <span id="currentTime">0:00</span>
          <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <span id="duration">0:00</span>
        </div>

        <div class="tracklist" id="tracklist"></div>
      </div>
    </div>
  </div>

  <audio id="audio" preload="metadata"></audio>

<script>
  const tracks = [
    {
      title: "How I Survive",
      src: "https://res.cloudinary.com/de6mu8teu/video/upload/v1779454818/6.HOW_I_SURVIVE_iwnwtg.mp3"
    },
    {
      title: "Air It Out",
      src: "https://res.cloudinary.com/de6mu8teu/video/upload/v1779454818/8.AIR_IT_OUT_nputbu.mp3"
    }
  ];

  const audio = document.getElementById('audio');
  const playBtn = document.getElementById('playBtn');
  const playIcon = document.getElementById('playIcon');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const trackName = document.getElementById('trackName');
  const currentTimeEl = document.getElementById('currentTime');
  const durationEl = document.getElementById('duration');
  const progressBar = document.getElementById('progressBar');
  const progressFill = document.getElementById('progressFill');
  const tracklist = document.getElementById('tracklist');
  const vinylBg = document.getElementById('vinylBg');

  const PLAY_SVG = '<path d="M8 5v14l11-7z"/>';
  const PAUSE_SVG = '<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>';

  let currentIndex = 0;

  function renderTracklist() {
    tracklist.innerHTML = '';
    tracks.forEach((t, i) => {
      const item = document.createElement('div');
      item.className = 'track-item' + (i === currentIndex ? ' active' : '');
      item.innerHTML = `<span class="track-num">${i + 1}</span><span>${t.title}</span>`;
      item.addEventListener('click', () => loadTrack(i, true));
      tracklist.appendChild(item);
    });
  }

  function loadTrack(index, autoplay = false) {
    currentIndex = (index + tracks.length) % tracks.length;
    const t = tracks[currentIndex];
    audio.src = t.src;
    trackName.textContent = t.title;
    renderTracklist();
    if (autoplay) audio.play();
  }

  function formatTime(s) {
    if (!isFinite(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60).toString().padStart(2, '0');
    return `${m}:${sec}`;
  }

  playBtn.addEventListener('click', () => {
    if (audio.paused) audio.play();
    else audio.pause();
  });

  prevBtn.addEventListener('click', () => loadTrack(currentIndex - 1, true));
  nextBtn.addEventListener('click', () => loadTrack(currentIndex + 1, true));

  audio.addEventListener('play', () => {
    playIcon.innerHTML = PAUSE_SVG;
    playBtn.setAttribute('aria-label', 'Pause');
    vinylBg.classList.add('playing');
  });

  audio.addEventListener('pause', () => {
    playIcon.innerHTML = PLAY_SVG;
    playBtn.setAttribute('aria-label', 'Play');
    vinylBg.classList.remove('playing');
  });

  audio.addEventListener('ended', () => loadTrack(currentIndex + 1, true));

  audio.addEventListener('loadedmetadata', () => {
    durationEl.textContent = formatTime(audio.duration);
  });

  audio.addEventListener('timeupdate', () => {
    const pct = (audio.currentTime / audio.duration) * 100 || 0;
    progressFill.style.width = pct + '%';
    currentTimeEl.textContent = formatTime(audio.currentTime);
  });

  progressBar.addEventListener('click', (e) => {
    const rect = progressBar.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    if (isFinite(audio.duration)) audio.currentTime = pct * audio.duration;
  });

  loadTrack(0, false);
</script>
</body>
</html>
